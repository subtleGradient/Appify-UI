<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="color-scheme" content="light dark">
    <title>Appify UI Smoke</title>
    <style>
      :root { color-scheme: light dark; }
      body {
        align-items: center;
        background: Canvas;
        color: CanvasText;
        display: grid;
        font: 14px/1.45 -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        margin: 0;
        min-height: 100vh;
        padding: 32px;
      }
      main {
        border-left: 4px solid #16a34a;
        max-width: 720px;
        padding-left: 20px;
      }
      h1 {
        font-size: 24px;
        font-weight: 650;
        letter-spacing: 0;
        line-height: 1.15;
        margin: 0 0 10px;
      }
      p {
        color: color-mix(in oklch, CanvasText 72%, transparent);
        margin: 0;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>Appify UI Smoke</h1>
      <p>Hello.webapp loaded through the Appify-UI package runner.</p>
    </main>
  </body>
</html>
