<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="color-scheme" content="light dark" />
    <title>Hello</title>
    <style>
      :root {
        color-scheme: light dark;
        font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }

      body {
        min-block-size: 100vh;
        margin: 0;
        display: grid;
        place-items: center;
        background: Canvas;
        color: CanvasText;
      }

      main {
        inline-size: min(34rem, calc(100vw - 3rem));
      }

      h1 {
        margin: 0;
        font-size: clamp(3rem, 12vw, 6rem);
        line-height: 0.95;
        letter-spacing: 0;
      }

      p {
        margin: 1rem 0 0;
        color: color-mix(in oklch, CanvasText 68%, transparent);
        font-size: 1.1rem;
        line-height: 1.45;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>Hello.</h1>
      <p>This file lives at <code>examples/hello-world.hi/index.html</code> and opens directly through AppifyHost.</p>
    </main>
  </body>
</html>
