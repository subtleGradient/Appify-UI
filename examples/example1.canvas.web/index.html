<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="color-scheme" content="light dark" />
    <title>example1.canvas.web</title>
    <link rel="stylesheet" href="./style.css" />
  </head>
  <body>
    <main class="app-shell">
      <header class="toolbar">
        <div>
          <strong>example1.canvas.web</strong>
          <span id="status">Opening</span>
        </div>
        <div class="actions">
          <button id="add-note" type="button">Text</button>
          <button id="add-link" type="button">Link</button>
          <button id="add-edge" type="button">Edge</button>
          <button id="reset" type="button">Reset</button>
          <button id="download" type="button">Download</button>
        </div>
      </header>

      <section class="workspace">
        <section class="canvas-panel" aria-label="JSON Canvas preview">
          <div id="canvas" class="canvas">
            <svg id="edges" class="edges" aria-hidden="true">
              <defs>
                <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto">
                  <path d="M 0 0 L 10 5 L 0 10 z"></path>
                </marker>
              </defs>
            </svg>
            <div id="nodes" class="nodes"></div>
          </div>
        </section>

        <aside class="inspector" aria-label="JSON Canvas source">
          <label for="json-source">JSON Canvas</label>
          <textarea id="json-source" spellcheck="false"></textarea>
          <div class="actions">
            <button id="apply-json" type="button">Apply JSON</button>
            <button id="format-json" type="button">Format</button>
          </div>
          <p class="hint">
            Edits use localStorage. In Web.app, the canvas writes back to
            <code>document.canvas</code>.
          </p>
        </aside>
      </section>
    </main>
    <script type="module" src="./app.js"></script>
  </body>
</html>
